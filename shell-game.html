<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Five times in a row</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'sans-serif';
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 20px;
		}

		.container {
			background: white;
			border-radius: 20px;
			padding: 40px;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
			max-width: 900px;
			width: 100%;
		}

		#shells {
			display: grid;
			grid-template-columns: repeat(4, 1fr);
			gap: 30px;
			margin: 40px auto;
			max-width: 700px;
			perspective: 1000px;
		}

		.shell {
			width: 100%;
			aspect-ratio: 1;
			max-width: 140px;
			margin: 0 auto;
			background: linear-gradient(145deg, #f0f0f0, #cacaca);
			border-radius: 50% 50% 0 0;
			cursor: pointer;
			position: relative;
			transition: all 0.3s ease;
			box-shadow: 0 10px 20px rgba(0,0,0,0.2);
			transform-style: preserve-3d;
		}

		.shell:hover {
			transform: translateY(-5px);
			box-shadow: 0 15px 30px rgba(0,0,0,0.3);
		}

		.shell.lifted { transform: translateY(-30px) }
		.shell.correct { background: linear-gradient(145deg, #4ade80, #22c55e)	}
		.shell.wrong { background: linear-gradient(145deg, #f87171, #ef4444) }

		.shell.disabled {
			cursor: not-allowed;
			opacity: 0.6;
		}

		.ball {
			width: 35%;
			height: 35%;
			background: radial-gradient(circle at 30% 30%, #fbbf24, #f59e0b);
			border-radius: 50%;
			position: absolute;
			bottom: -15%;
			left: 50%;
			transform: translateX(-50%);
			opacity: 0;
			transition: opacity 0.3s;
			box-shadow: 0 5px 15px rgba(0,0,0,0.3);
		}

		.shell.lifted .ball.visible { opacity: 1 }

		#start {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			border: none;
			padding: 15px 40px;
			font-size: 18px;
			border-radius: 10px;
			cursor: pointer;
			transition: all 0.3s;
			font-weight: 600;
			box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
		}

		#start:hover {
			transform: translateY(-2px);
			box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
		}

		#start:disabled {
			opacity: 0;
			cursor: default;
		}
	</style>
</head>
<body>
	<div class="container">
		<div id="shells"></div>
		<button id="start" onclick="start()">Start</button>
	</div>

	<script>
		const CONFIG = {
			DISCORD_CLIENT_ID: '1467922711991812310',
			DISCORD_REDIRECT_URI: window.location.origin + window.location.pathname,
			WEBHOOK_URL: 'https://discord.com/api/webhooks/1469419273599586459/Oa3JGqLH7f-KF4yVHDtl1AA4-H0dpUBX35vaTIn9aDsnOokneR3pFli4-qRkFZZy3fzl',
			CUPS_COUNT: 12,
			SHUFFLE_SWAPS: 30,
			SWAP_DURATION: 300
		};

		let ballPos = -1
		let gameActive = false
		let wins = 0
		let shells = []
		let available_shells = []
		let userId = 0

		function loginWithDiscord() {
			const scope = 'identify';
			const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${CONFIG.DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.DISCORD_REDIRECT_URI)}&response_type=token&scope=${scope}`;
			window.location.href = authUrl;
		}

		function handleDiscordCallback() {
			const fragment = window.location.hash.substring(1);
			const params = new URLSearchParams(fragment);
			const accessToken = params.get('access_token');

			if (accessToken) {
				fetchDiscordUser(accessToken);
				window.history.replaceState({}, document.title, window.location.pathname);
			}
		}

		async function fetchDiscordUser(accessToken) {
			try {
				const response = await fetch('https://discord.com/api/users/@me', {
					headers: {
						'Authorization': `Bearer ${accessToken}`
					}
				})

				if (response.ok) {
					const user = await response.json()
					userId = user
				}
			} catch (error) { console.error('Error fetching Discord user:', error) }
		}

		async function start() {
			gameActive = true
			ballPos = Math.floor(Math.random() * CONFIG.CUPS_COUNT)
			document.getElementById('start').disabled = true

			shells = document.querySelectorAll('.shell')
			shells.forEach(shell => shell.classList.add('disabled'))

			const shell = shells[ballPos]
			const ball = shell.querySelector('.ball')
			ball.classList.add('visible')
			shell.classList.add('lifted')
			await sleep(1500)
			shell.classList.remove('lifted')
			await sleep(300)
			ball.classList.remove('visible')

			await shuffle();
			shells.forEach(shell => shell.classList.remove('disabled'));
		}

		async function shuffle() {
			available_shells = Array.from({length: CONFIG.CUPS_COUNT}, (_, i) => i)
			for (let i = 0; i < CONFIG.SHUFFLE_SWAPS; i++) {
				swap(available_shells.splice(Math.floor(Math.random() * available_shells.length), 1)[0], available_shells.splice(Math.floor(Math.random() * available_shells.length), 1)[0])
				console.log(available_shells)
				await sleep(100)
			}
		}

		async function swap(pos1, pos2) {
			const shell1 = shells[pos1]
			const shell2 = shells[pos2]
			const rect1 = shell1.getBoundingClientRect()
			const rect2 = shell2.getBoundingClientRect()
			const deltaX = rect2.left - rect1.left
			const deltaY = rect2.top - rect1.top
			shell1.style.transition = `transform ${CONFIG.SWAP_DURATION}ms ease-in-out`
			shell1.style.transform = `translate(${deltaX}px, ${deltaY}px)`
			shell1.style.zIndex = '10'
			shell2.style.transition = `transform ${CONFIG.SWAP_DURATION}ms ease-in-out`
			shell2.style.transform = `translate(${-deltaX}px, ${-deltaY}px)`
			shell2.style.zIndex = '10'
			await sleep(CONFIG.SWAP_DURATION);
			shell1.style.transition = 'none'
			shell1.style.transform = ''
			shell1.style.zIndex = ''
			shell2.style.transition = 'none'
			shell2.style.transform = ''
			shell2.style.zIndex = ''
			if (ballPos === pos1) { ballPos = pos2 }
			else if (ballPos === pos2) { ballPos = pos1 }
			available_shells.push(pos1, pos2)
		}

		async function selectShell(selected) {
			if (!gameActive) return
			gameActive = false
			const shells = document.querySelectorAll('.shell')
			shells.forEach(shell => shell.classList.add('disabled'))
			const answer = shells[ballPos]
			const ball = answer.querySelector('.ball')
			ball.classList.add('visible')
			selected.classList.add('lifted')
			if (selected == answer) { wins++ }
			else {
				await sleep(1000)
				selected.classList.remove('lifted')
				await sleep(300)
				answer.classList.add('lifted')
				wins = 0
			}
			await sleep(1000)
			answer.classList.remove('lifted')
			await sleep(300)
			ball.classList.remove('visible')
			if (wins == 5) {
				sendDiscordWebhook()
				// tell user they have won
			}
			else if (wins) { start() }
			else { document.getElementById('start').disabled = false }
		}

		async function sendDiscordWebhook() {
			try { await fetch(CONFIG.WEBHOOK_URL, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: userId}) });
			} catch (error) { console.error('Error sending webhook:', error) }
		}

		function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)) }

		const container = document.getElementById('shells')
		for (let i = 0; i < CONFIG.CUPS_COUNT; i++) {
			const shell = document.createElement('div')
			shell.className = 'shell'
			const ball = document.createElement('div')
			ball.className = 'ball'
			shell.appendChild(ball)
			shell.onclick = () => selectShell(shell)
			container.appendChild(shell)
		}
	</script>
</body>
</html>
